<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SofIA</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base:#0d0f14; --bg-sidebar:#13161e; --bg-card:#1a1d27; --bg-input:#20243a;
      --accent:#bbd531; --accent-dim:#2d5cb8; --text-main:#e8eaf0; --text-muted:#6b7280;
      --text-dim:#9ca3af; --bubble-user:#1e3a6e; --bubble-bot:#1a1d27;
      --border:#2a2d3e; --shadow:0 4px 24px rgba(0,0,0,0.4); --radius:14px;
    }
    html,body,#root{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-base);color:var(--text-main);}
    .app{display:flex;height:100vh;overflow:hidden;}
    /* SIDEBAR */
    .sidebar{width:260px;min-width:260px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 16px;gap:24px;}
    .sidebar-logo{display:flex;align-items:center;padding:4px 8px;justify-content:center;}
    .logo-img{height:70px;width:auto;object-fit:contain;}
    .new-chat-btn{display:flex;align-items:center;gap:8px;background:var(--bg-input);border:1px solid var(--border);color:var(--text-main);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;}
    .new-chat-btn:hover{background:var(--bg-card);border-color:var(--accent);}
    .sidebar-section-title{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text-muted);padding:0 8px;}
    .chat-history{display:flex;flex-direction:column;gap:4px;flex:1;overflow-y:auto;}
    .history-item{padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-dim);overflow:hidden;transition:background .15s;display:flex;align-items:center;gap:4px;}
    .history-item:hover{background:var(--bg-card);color:var(--text-main);}
    .history-item.active{background:var(--bg-input);color:var(--text-main);}
    .history-item-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .history-delete-btn{flex-shrink:0;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:17px;line-height:1;padding:0 2px;border-radius:4px;opacity:0;transition:opacity .15s,color .15s;}
    .history-item:hover .history-delete-btn{opacity:1;}
    .history-delete-btn:hover{color:#ef4444;}
    .sidebar-footer{border-top:1px solid var(--border);padding-top:16px;display:flex;align-items:center;gap:10px;}
    .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#171352,#303483);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
    .user-info{flex:1;overflow:hidden;}
    .user-name{font-size:13px;font-weight:600;}
    .user-role{font-size:11px;color:var(--text-muted);}
    /* CHAT MAIN */
    .chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
    .chat-header{padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg-base);display:flex;align-items:center;justify-content:space-between;}
    .chat-header-title{font-size:15px;font-weight:600;}
    .chat-header-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .status-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:#bbd531;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);border-radius:20px;padding:4px 12px;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:#bbd531;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    /* MESSAGES */
    .messages-area{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth;}
    .messages-area::-webkit-scrollbar{width:7px;}
    .messages-area::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);border-radius:4px;}
    .messages-area::-webkit-scrollbar-thumb{background:rgba(187,213,49,0.35);border-radius:4px;transition:background .2s;}
    .messages-area::-webkit-scrollbar-thumb:hover{background:rgba(187,213,49,0.65);}
    .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;text-align:center;padding:40px;}
    .welcome-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#ffffff,#ffffff);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:8px;}
    .welcome h2{font-size:22px;font-weight:700;}
    .welcome p{color:var(--text-muted);font-size:14px;max-width:400px;line-height:1.6;}
    .suggestions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:8px;}
    .suggestion-chip{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text-dim);transition:all .15s;}
    .suggestion-chip:hover{border-color:var(--accent);color:var(--text-main);background:var(--bg-input);}
    .msg-row{display:flex;gap:12px;align-items:flex-start;}
    .msg-row.user{flex-direction:row-reverse;}
    .msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
    .msg-avatar.bot-av{background:linear-gradient(135deg,#4f8ef7,#7c5cfc);margin-top:2px;}
    .msg-avatar.user-av{background:var(--bubble-user);border:1px solid var(--accent-dim);}
    .bubble{max-width:70%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.65;word-break:break-word;}
    .bubble.user-bubble{background:var(--bubble-user);border:1px solid var(--accent-dim);border-bottom-right-radius:4px;color:var(--text-main);}
    .bubble.bot-bubble{background:var(--bubble-bot);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .bubble-time{font-size:11px;color:var(--text-muted);margin-top:4px;}
    .bubble table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px;}
    .bubble th{background:rgba(79,142,247,.15);color:var(--accent);font-weight:600;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);}
    .bubble td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.04);}
    .bubble tr:last-child td{border-bottom:none;}
    .bubble tr:hover td{background:rgba(255,255,255,.03);}
    /* TYPING */
    .typing{display:flex;align-items:center;gap:4px;padding:14px 16px;}
    .typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.4;animation:blink 1.2s infinite;}
    .typing span:nth-child(2){animation-delay:.2s;}
    .typing span:nth-child(3){animation-delay:.4s;}
    @keyframes blink{0%,80%,100%{opacity:.4}40%{opacity:1}}
    /* INPUT */
    .input-area{padding:16px 28px 20px;border-top:1px solid var(--border);background:var(--bg-base);position:relative;}
    .input-wrapper{display:flex;align-items:flex-end;gap:10px;background:var(--bg-input);border:1px solid var(--border);border-radius:14px;padding:10px 14px;transition:border-color .15s;}
    .input-wrapper:focus-within{border-color:var(--accent);}
    .chat-input{flex:1;background:transparent;border:none;outline:none;color:var(--text-main);font-size:14px;resize:none;line-height:1.5;max-height:120px;font-family:inherit;}
    .chat-input::placeholder{color:var(--text-muted);}
    .send-btn{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;color:white;}
    .send-btn:hover{background:var(--accent-dim);}
    .send-btn:disabled{background:var(--bg-card);cursor:not-allowed;opacity:.5;}
    .input-hint{font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center;}
    .mode-btn{width:34px;height:34px;border-radius:8px;flex-shrink:0;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .mode-btn:hover{border-color:var(--accent);}
    .mode-btn.mode-btn-active{border-color:var(--accent);background:rgba(187,213,49,.12);}
    .mode-popup{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px;z-index:100;box-shadow:var(--shadow);min-width:260px;}
    .mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .mode-option{display:flex;flex-direction:column;align-items:center;padding:10px 6px;border-radius:10px;cursor:pointer;background:var(--bg-input);border:1px solid transparent;transition:all .15s;color:var(--text-dim);}
    .mode-option:hover{border-color:var(--border);color:var(--text-main);}
    .mode-option.mode-option-active{border-color:var(--accent);color:var(--text-main);background:rgba(187,213,49,.1);}
    .mode-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(187,213,49,.1);border:1px solid rgba(187,213,49,.3);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--accent);margin-bottom:8px;}
    .mode-badge-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;line-height:1;padding:0;margin-left:2px;}
    .mode-badge-close:hover{color:var(--text-main);}
    /* AUDIO BTN */
    .audio-btn{width:34px;height:34px;border-radius:8px;flex-shrink:0;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;outline:none;}
    .audio-btn:hover{border-color:var(--accent);}
    .audio-btn.recording{background:rgba(239,68,68,.15);border-color:#ef4444;animation:recPulse 1s ease-in-out infinite;}
    .audio-btn.transcribing{background:rgba(79,142,247,.12);border-color:#4f8ef7;cursor:not-allowed;}
    @keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
    .audio-btn svg{transition:all .2s;}
    .audio-btn.recording svg{color:#ef4444;}
    .audio-btn.transcribing svg{color:#4f8ef7;animation:spin .8s linear infinite;}
    .audio-toast{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1d27;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--text-muted);white-space:nowrap;pointer-events:none;z-index:10;}
    .battery-bar-track{background:var(--border);border-radius:6px;height:10px;overflow:hidden;flex:1;}
    .battery-bar-fill{height:100%;border-radius:6px;transition:width .6s ease;}
    .map-container{height:200px;border-radius:10px;margin-top:10px;overflow:hidden;}
    .leaflet-container{font-family:inherit!important;font-size:13px!important;}
    /* ACTION BUTTONS */
    .action-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
    .csv-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(187,213,49,.12);border:1px solid rgba(187,213,49,.35);color:var(--accent);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
    .csv-btn:hover{background:rgba(187,213,49,.22);border-color:var(--accent);}
    .informe-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.35);color:#4f8ef7;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
    .informe-btn:hover{background:rgba(79,142,247,.22);border-color:#4f8ef7;}
    /* MODAL */
    .modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;width:92vw;max-width:960px;height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,0.6);animation:slideUp .25s ease;overflow:hidden;}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:64px;}
    .modal-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .modal-header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .modal-action-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;border:none;transition:all .15s;}
    .btn-download{background:rgba(187,213,49,.15);color:var(--accent);border:1px solid rgba(187,213,49,.3)!important;}
    .btn-download:hover{background:rgba(187,213,49,.25);}
    .btn-newtab{background:rgba(79,142,247,.15);color:#4f8ef7;border:1px solid rgba(79,142,247,.3)!important;}
    .btn-newtab:hover{background:rgba(79,142,247,.25);}
    .btn-close{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)!important;width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-size:18px;}
    .btn-close:hover{background:rgba(239,68,68,.2);}
    .modal-body{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column;}
    .modal-iframe{flex:1;width:100%;height:100%;border:none;border-bottom-left-radius:20px;border-bottom-right-radius:20px;display:block;}
    .modal-loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg-card);border-radius:0 0 20px 20px;min-height:400px;}
    .modal-loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .modal-loading p{font-size:13px;color:var(--text-muted);}
    .modal-loading small{font-size:11px;color:var(--text-dim);margin-top:-8px;}
    .apikey-form{display:flex;flex-direction:column;gap:10px;padding:20px;min-width:320px;}
    .apikey-form label{font-size:12px;color:var(--text-muted);font-weight:600;}
    .apikey-input{background:var(--bg-input);border:1px solid var(--border);color:var(--text-main);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;transition:border-color .15s;font-family:'Courier New',monospace;}
    .apikey-input:focus{border-color:var(--accent);}
    .apikey-submit{background:var(--accent);color:#0d0f14;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;}
    .apikey-submit:hover{opacity:.88;}
    .apikey-note{font-size:11px;color:var(--text-muted);line-height:1.5;}

    /* ════ LOGIN ════════════════════════════════════════════════════════ */
    .login-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
      background:#0a0c10;overflow:hidden;}
    .login-bg{position:absolute;inset:0;overflow:hidden;}
    .login-bg-grid{position:absolute;inset:0;
      background-image:linear-gradient(rgba(187,213,49,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(187,213,49,.04) 1px,transparent 1px);
      background-size:40px 40px;}
    .login-bg-glow{position:absolute;width:600px;height:600px;border-radius:50%;
      background:radial-gradient(circle,rgba(187,213,49,.08) 0%,transparent 70%);
      top:50%;left:50%;transform:translate(-50%,-50%);animation:glowPulse 4s ease-in-out infinite;}
    @keyframes glowPulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}
      50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}
    .login-card{position:relative;z-index:1;width:420px;max-width:92vw;
      background:rgba(26,29,39,.95);border:1px solid rgba(187,213,49,.15);
      border-radius:24px;padding:44px 40px 36px;
      box-shadow:0 0 0 1px rgba(187,213,49,.05),0 32px 64px rgba(0,0,0,.6);
      backdrop-filter:blur(20px);}
    .login-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:36px;}
    .login-logo-img{height:64px;width:auto;object-fit:contain;filter:drop-shadow(0 0 20px rgba(187,213,49,.3));}
    .login-tagline{font-size:11px;letter-spacing:2px;text-transform:uppercase;
      color:rgba(187,213,49,.6);margin-top:10px;font-family:'Courier New',monospace;}
    .login-field{margin-bottom:18px;}
    .login-label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;
      text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
    .login-input{width:100%;background:rgba(13,15,20,.8);border:1px solid var(--border);
      color:var(--text-main);border-radius:10px;padding:12px 16px;font-size:14px;
      outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit;}
    .login-input:focus{border-color:rgba(187,213,49,.5);
      box-shadow:0 0 0 3px rgba(187,213,49,.08);}
    .login-input::placeholder{color:var(--text-muted);}
    .login-btn{width:100%;margin-top:8px;padding:13px;border:none;border-radius:10px;
      background:var(--accent);color:#0d0f14;font-size:14px;font-weight:700;
      cursor:pointer;letter-spacing:.3px;transition:all .2s;position:relative;overflow:hidden;}
    .login-btn:hover{background:#cce440;transform:translateY(-1px);
      box-shadow:0 8px 24px rgba(187,213,49,.25);}
    .login-btn:active{transform:translateY(0);}
    .login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
      border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-top:16px;
      text-align:center;animation:shake .3s ease;}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .login-footer{text-align:center;margin-top:20px;font-size:11px;color:var(--text-muted);}
    .login-dot{display:inline-block;width:6px;height:6px;border-radius:50%;
      background:var(--accent);margin-right:6px;animation:pulse 2s infinite;}
    /* Animación de entrada */
    .login-card{animation:loginIn .5s cubic-bezier(.34,1.56,.64,1);}
    @keyframes loginIn{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* ── Hint 💡 clickeable ──────────────────────────────────────────── */
    .hint-clickable {
      display:inline-flex;align-items:center;gap:6px;
      color:var(--accent);font-size:12px;font-style:italic;
      cursor:pointer;padding:4px 10px;border-radius:6px;
      border:1px solid rgba(187,213,49,0.2);
      background:rgba(187,213,49,0.05);
      transition:all .18s;user-select:none;
      text-decoration:none;
    }
    .hint-clickable:hover{
      background:rgba(187,213,49,0.14);
      border-color:rgba(187,213,49,0.45);
      transform:translateY(-1px);
      box-shadow:0 3px 10px rgba(187,213,49,0.12);
    }
    .hint-clickable:active{transform:translateY(0);}
    .hint-clickable .hint-icon{font-style:normal;font-size:14px;}
    @media(max-width:640px){.sidebar{display:none;}.messages-area{padding:16px;}.input-area{padding:12px 16px 16px;}.modal-box{width:98vw;height:96vh;border-radius:14px;}}
  </style>
</head>
<body>
<div id="root"></div>

// ─── DETECCIÓN DE TIPO DE MENSAJE ─────────────────────────────────────
// Devuelve: "dispositivo" | "flota" | "ninguno"
function detectarTipoInforme(msg) {
  if (!msg || msg.role !== "bot") return "ninguno";

  // Informe de dispositivo: tiene datos de mapa O tiene ficha de serial (detalle)
  // Señales: .map existe, o html contiene "Serial:" y "Modelo:" y "Estado:" (ficha individual)
  if (msg.map) return "dispositivo";
  if (msg.html) {
    const h = msg.html;
    // Ficha individual: contiene bloque de detalle con serial+estado
    const esDetalle = h.includes("Serial:") && h.includes("Estado:") && h.includes("Batería:") && !h.includes("<tr><td>#</td>");
    if (esDetalle) return "dispositivo";
    // Informe de flota: tiene tabla con múltiples filas
    if (h.includes("<table")) return "flota";
  }
  return "ninguno";
}

// ─── PARSER DE MÉTRICAS (FLOTA) ───────────────────────────────────────
// Prioridad 1: informe_data del backend (datos exactos, cero parseo)
// Prioridad 2: fallback regex sobre HTML (compatibilidad retroactiva)
function parsearMetricasFlota(html, informeData) {
  if (informeData && informeData.tipo === 'flota' && informeData.kpis) {
    return {
      total:      informeData.kpis.total,
      online:     informeData.kpis.online,
      offline:    informeData.kpis.offline,
      modelos:    informeData.kpis.modelos,
      modelosArr: informeData.modelosArr || [],
      textoPlano: ""
    };
  }
  // Fallback
  const parser = new DOMParser();
  const doc = parser.parseFromString(html || "","text/html");
  const texto = doc.body.innerText || doc.body.textContent || "";
  const onlineMatch  = texto.match(/(?:🟢|En línea|Conectados?|Encendidos?)[\s:·]*(\d+)/i);
  const offlineMatch = texto.match(/(?:🔴|Desconectados?|Apagados?)[\s:·]*(\d+)/i);
  const totalMatch   = texto.match(/Total[^\d]*(\d+)/i);
  return {
    total:      totalMatch   ? parseInt(totalMatch[1])   : null,
    online:     onlineMatch  ? parseInt(onlineMatch[1])  : null,
    offline:    offlineMatch ? parseInt(offlineMatch[1]) : null,
    modelos:    null,
    modelosArr: [],
    textoPlano: texto.slice(0, 3000)
  };
}

// ─── GENERADOR SVG BARRAS APILADAS POR MODELO ─────────────────────────
function generarSvgBarrasModelos(modelosArr, titulo) {
  if (!modelosArr || modelosArr.length === 0) return "";

  const items  = modelosArr.slice(0, 15);
  const barH   = 32;
  const gap    = 14;
  const labelW = 120;
  const chartW = 520;
  const padT   = 36;
  const padB   = 20;
  // Extra espacio derecho para etiquetas externas + %
  const extraR = 100;
  const svgW   = labelW + chartW + extraR;
  const svgH   = padT + items.length * (barH + gap) + padB;
  const maxVal = Math.max(...items.map(m => m.total), 1);

  const C_ON  = "#22c55e";
  const C_OFF = "#ef4444";
  const C_ON2 = "#16a34a";
  const C_OFF2= "#b91c1c";

  // Umbral mínimo en píxeles para mostrar etiqueta DENTRO de la barra
  const MIN_INSIDE = 36;
  // Umbral mínimo para dibujar la barra (evita rectángulos de 0px)
  const MIN_BAR = 4;

  let defs = "";
  let bars = "";

  items.forEach((m, i) => {
    const y      = padT + i * (barH + gap);
    const wTotal = Math.max(Math.round((m.total / maxVal) * chartW), MIN_BAR);
    const wOn    = m.total > 0 ? Math.round((m.on  / m.total) * wTotal) : 0;
    const wOff   = wTotal - wOn;
    const x0     = labelW;
    const pct    = m.total > 0 ? Math.round((m.on / m.total) * 100) : 0;
    const cy     = y + barH / 2 + 4.5; // centro vertical del texto

    // ── Gradientes (en <defs> agrupados al inicio) ──────────────────
    defs += `
      <linearGradient id="g_on_${i}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="${C_ON2}"/>
        <stop offset="100%" stop-color="${C_ON}"/>
      </linearGradient>
      <linearGradient id="g_off_${i}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="${C_OFF2}"/>
        <stop offset="100%" stop-color="${C_OFF}"/>
      </linearGradient>`;

    // ── Fondo track ─────────────────────────────────────────────────
    bars += `<rect x="${x0}" y="${y}" width="${chartW}" height="${barH}" rx="6" fill="#f1f5f9"/>`;

    // ── Segmento ON ─────────────────────────────────────────────────
    if (wOn >= MIN_BAR) {
      // Esquinas: izquierda redondeada siempre; derecha redondeada solo si no hay OFF
      const r = 6;
      const noOff = wOff < MIN_BAR;
      if (noOff) {
        // Barra completa con todos los bordes redondeados
        bars += `<rect x="${x0}" y="${y}" width="${wOn}" height="${barH}" rx="${r}" fill="url(#g_on_${i})"/>`;
      } else {
        // Solo esquinas izquierdas redondeadas
        const x2 = x0 + wOn, y2 = y + barH;
        bars += `<path d="M${x0+r},${y} H${x2} V${y2} H${x0+r} Q${x0},${y2} ${x0},${y2-r} V${y+r} Q${x0},${y} ${x0+r},${y} Z" fill="url(#g_on_${i})"/>`;
      }
      // Etiqueta ON: dentro si cabe, fuera (arriba) si no
      if (wOn >= MIN_INSIDE) {
        bars += `<text x="${x0 + wOn/2}" y="${cy}" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter,sans-serif">${m.on}</text>`;
      } else {
        // Etiqueta pequeña encima del segmento
        bars += `<text x="${x0 + wOn/2}" y="${y - 4}" text-anchor="middle" fill="${C_ON2}" font-size="10" font-weight="700" font-family="Inter,sans-serif">${m.on}</text>`;
      }
    }

    // ── Segmento OFF ─────────────────────────────────────────────────
    if (wOff >= MIN_BAR) {
      const xOff = x0 + wOn;
      const r = 6;
      const x2 = xOff + wOff, y2 = y + barH;
      // Esquinas derechas redondeadas
      bars += `<path d="M${xOff},${y} H${x2-r} Q${x2},${y} ${x2},${y+r} V${y2-r} Q${x2},${y2} ${x2-r},${y2} H${xOff} Z" fill="url(#g_off_${i})"/>`;

      if (wOff >= MIN_INSIDE) {
        // Etiqueta dentro
        bars += `<text x="${xOff + wOff/2}" y="${cy}" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter,sans-serif">${m.off}</text>`;
      } else {
        // Etiqueta fuera: a la derecha del segmento OFF con línea guía
        const labelX = x2 + 6;
        bars += `<line x1="${x2}" y1="${y + barH/2}" x2="${labelX - 1}" y2="${y + barH/2}" stroke="${C_OFF}" stroke-width="1" opacity="0.5"/>`;
        bars += `<text x="${labelX}" y="${cy}" text-anchor="start" fill="${C_OFF}" font-size="10" font-weight="700" font-family="Inter,sans-serif">${m.off}</text>`;
      }
    }

    // ── Label modelo izquierda ───────────────────────────────────────
    const nombre = m.nombre.length > 15 ? m.nombre.slice(0, 14) + "…" : m.nombre;
    bars += `<text x="${labelW - 8}" y="${cy}" text-anchor="end" fill="#374151" font-size="12" font-weight="600" font-family="Inter,sans-serif">${nombre}</text>`;

    // ── % conectividad derecha ───────────────────────────────────────
    const pctColor = pct >= 70 ? C_ON : pct >= 40 ? "#f59e0b" : C_OFF;
    bars += `<text x="${x0 + chartW + 10}" y="${cy}" fill="${pctColor}" font-size="11" font-weight="700" font-family="Inter,sans-serif">${pct}%</text>`;
  });

  const axisLabel = `<text x="${labelW}" y="16" fill="#9ca3af" font-size="10" font-family="Inter,sans-serif" font-weight="600" letter-spacing="0.5">DISPOSITIVOS POR MODELO</text>`;

  return `
<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:24px;overflow-x:auto;">
  <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:16px;">${titulo}</div>
  <svg viewBox="0 0 ${svgW} ${svgH}" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:420px;">
    <defs>${defs}</defs>
    ${axisLabel}
    ${bars}
  </svg>
  <div style="display:flex;gap:20px;margin-top:14px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;">
      <div style="width:12px;height:12px;border-radius:3px;background:${C_ON};"></div> Encendidos / En línea
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;">
      <div style="width:12px;height:12px;border-radius:3px;background:${C_OFF};"></div> Apagados / Desconectados
    </div>
    <div style="margin-left:auto;font-size:11px;color:#9ca3af;">% = conectividad por modelo</div>
  </div>
</div>`;
}

// ─── PARSER DE DATOS DE DISPOSITIVO ──────────────────────────────────
// Prioridad 1: informe_data del backend (datos exactos, cero parseo)
// Prioridad 2: fallback msg.battery + msg.map + HTML
function parsearDatosDispositivo(msg) {
  if (msg.informe_data && msg.informe_data.tipo === 'dispositivo' && msg.informe_data.dispositivo) {
    const d = msg.informe_data.dispositivo;
    return {
      nombre:      d.nombre      || "Dispositivo",
      serial:      d.serial      || "N/D",
      modelo:      d.modelo      || "N/D",
      fabricante:  d.fabricante  || "",
      estado:      d.estado      || "Desconectado",
      bateria:     d.bateria,
      negocio:     d.negocio     || "NUTRESA MOVILIDAD",
      ultimaConex: d.ultimaConex || "N/D",
      lat:         d.lat,
      lng:         d.lng,
      puntosGPS:   msg.informe_data.puntosGPS  || [],
      puntosBat:   msg.informe_data.puntosBat  || [],
      puntosRed:   msg.informe_data.puntosRed  || []
    };
  }
  // Fallback
  const bat = msg.battery || {};
  const parser = new DOMParser();
  const doc = msg.html ? parser.parseFromString(msg.html,"text/html") : null;
  const texto = doc ? (doc.body.innerText || doc.body.textContent || "") : "";
  const getField = (label) => {
    const match = texto.match(new RegExp(label+"[:\\s]+([^\\n]+)","i"));
    return match ? match[1].trim() : null;
  };
  let puntosGPS = [];
  if (msg.map && msg.map.history && msg.map.history.length > 0) puntosGPS = msg.map.history;
  else if (msg.map) puntosGPS = [{ lat: msg.map.lat, lng: msg.map.lng, fecha: "Último registro", num: 1 }];
  return {
    nombre:      bat.name    || getField("dispositivo") || "Dispositivo",
    serial:      bat.serial  || getField("serial") || "N/D",
    modelo:      bat.model   || getField("modelo") || "N/D",
    fabricante:  getField("fabricante") || "",
    estado:      getField("estado") || (bat.online_raw ? "Conectado" : "Desconectado"),
    bateria:     bat.level != null ? bat.level : (parseInt(getField("batería")) || null),
    negocio:     getField("negocio") || CLIENTE_CONFIG.nombre,
    ultimaConex: bat.lastSeen || getField("última conex") || "N/D",
    lat:         msg.map?.lat || null,
    lng:         msg.map?.lng || null,
    puntosGPS,
    puntosBat:   [],
    puntosRed:   []
  };
}

// ─── ANÁLISIS IA (OPENAI) ─────────────────────────────────────────────
// ─── ANÁLISIS IA — delega a n8n /api/informe ─────────────────────────
// La API key de OpenAI vive en n8n. El cliente nunca la ve.
async function generarAnalisisIA(tipo, informeData) {
  const resp = await fetch(`${API_BASE}/webhook/api/informe`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ tipo, informe_data: informeData })
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status} al llamar /api/informe`);
  const data = await resp.json();
  if (!data.analisis) throw new Error("El servidor no devolvió análisis");
  return data.analisis;
}

// ─── DESCARGA HTML ────────────────────────────────────────────────────
function descargarHtml(htmlContent, filename) {
  const blob = new Blob([htmlContent],{type:"text/html;charset=utf-8;"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ─── DESCARGA CSV ─────────────────────────────────────────────────────
function downloadCSV(html, filename) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html,"text/html");
  const tables = doc.querySelectorAll("table");
  if (!tables.length) return;
  let csv = "\uFEFF";
  tables.forEach((table,tIdx) => {
    const titulo = table.querySelector("th[colspan]");
    if (titulo) csv += `"${(titulo.textContent||"").replace(/"/g,'""').trim()}"\n`;
    table.querySelectorAll("tr").forEach(row => {
      if ((row.textContent||"").includes("💡")) return;
      if (row.querySelector("th[colspan]")) return;
      const vals = Array.from(row.querySelectorAll("th,td")).map(c=>`"${(c.textContent||"").trim().replace(/\n/g," ").replace(/"/g,'""')}"`);
      if (vals.length) csv += vals.join(",")+"\n";
    });
    if (tIdx < tables.length-1) csv += "\n";
  });
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ════════════════════════════════════════════════════════════════════
// GENERADOR DE INFORME — DISPOSITIVO
// ════════════════════════════════════════════════════════════════════
// ─── GENERADOR SVG GRÁFICA DE BATERÍA EN EL TIEMPO ───────────────────
// puntosBat: [{fecha, bateria, nivel}] — ordenados cronológicamente (más antiguo primero)
function generarSvgBateria(puntosBat, titulo) {
  if (!puntosBat || puntosBat.length < 2) return "";

  const n      = puntosBat.length;
  const svgW   = 680;
  const svgH   = 210;
  const padL   = 46;
  const padR   = 18;
  const padT   = 20;
  const padB   = 52;
  const chartW = svgW - padL - padR;
  const chartH = svgH - padT - padB;

  const xScale = i => padL + (i / (n - 1)) * chartW;
  const yScale = v => padT + chartH - (Math.min(100, Math.max(0, v)) / 100) * chartH;

  // Líneas de referencia
  const refs = [
    { v: 80, label: "80%", color: "#22c55e" },
    { v: 50, label: "50%", color: "#f59e0b" },
    { v: 20, label: "20%", color: "#ef4444" }
  ];
  let refLines = "";
  refs.forEach(r => {
    const y = yScale(r.v);
    refLines += `<line x1="${padL}" y1="${y}" x2="${svgW-padR}" y2="${y}" stroke="${r.color}" stroke-width="1" stroke-dasharray="4,3" opacity="0.45"/>`;
    refLines += `<text x="${padL-4}" y="${y+4}" text-anchor="end" fill="${r.color}" font-size="9" font-family="Inter,sans-serif" font-weight="600">${r.label}</text>`;
  });

  // Línea y área
  const polyPoints = puntosBat.map((p,i) => `${xScale(i)},${yScale(p.bateria)}`).join(" ");
  const areaPath   = [
    `M${xScale(0)},${yScale(puntosBat[0].bateria)}`,
    ...puntosBat.slice(1).map((p,i) => `L${xScale(i+1)},${yScale(p.bateria)}`),
    `L${xScale(n-1)},${padT+chartH}`,
    `L${xScale(0)},${padT+chartH}`,
    "Z"
  ].join(" ");

  const avgBat    = puntosBat.reduce((s,p) => s + p.bateria, 0) / n;
  const lineColor = avgBat >= 50 ? "#22c55e" : avgBat >= 20 ? "#f59e0b" : "#ef4444";

  // Puntos
  let puntosSvg = "";
  puntosBat.forEach((p, i) => {
    const cx  = xScale(i);
    const cy  = yScale(p.bateria);
    const col = p.bateria >= 80 ? "#16a34a" : p.bateria >= 50 ? "#d97706" : p.bateria >= 20 ? "#dc2626" : "#7f1d1d";
    // Punto
    puntosSvg += `<circle cx="${cx}" cy="${cy}" r="4.5" fill="${col}" stroke="white" stroke-width="1.5"><title>${p.fecha}: ${p.bateria}% (${p.nivel})</title></circle>`;
    // Etiqueta: primero, último y cada 4
    if (i === 0 || i === n-1 || i % 4 === 0) {
      const anchor = i === 0 ? "start" : i === n-1 ? "end" : "middle";
      puntosSvg += `<text x="${cx}" y="${cy-9}" text-anchor="${anchor}" fill="${col}" font-size="9" font-weight="700" font-family="Inter,sans-serif">${p.bateria}%</text>`;
    }
  });

  // Etiquetas eje X: primero, cuarto, mitad, tres cuartos, último
  const xIdxs = [...new Set([0, Math.floor(n/4), Math.floor(n/2), Math.floor(3*n/4), n-1])];
  let xLabels = "";
  xIdxs.forEach(i => {
    const p     = puntosBat[i];
    if (!p) return;
    const x     = xScale(i);
    // Mostrar solo hora y minuto
    const short = p.fecha.includes(",") ? p.fecha.split(",")[1].trim() : p.fecha;
    xLabels += `<text x="${x}" y="${svgH-6}" text-anchor="middle" fill="#9ca3af" font-size="9" font-family="Inter,sans-serif">${short}</text>`;
  });

  return `
<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:20px 20px 16px;overflow-x:auto;">
  <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:12px;">${titulo}</div>
  <svg viewBox="0 0 ${svgW} ${svgH}" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:320px;">
    <rect x="${padL}" y="${padT}" width="${chartW}" height="${chartH}" fill="white" rx="4" stroke="#f1f5f9" stroke-width="1"/>
    ${refLines}
    <path d="${areaPath}" fill="${lineColor}" opacity="0.07"/>
    <polyline points="${polyPoints}" fill="none" stroke="${lineColor}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${puntosSvg}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="${padL}" y1="${padT+chartH}" x2="${svgW-padR}" y2="${padT+chartH}" stroke="#e5e7eb" stroke-width="1"/>
    ${xLabels}
    <text x="12" y="${padT+chartH/2}" text-anchor="middle" fill="#9ca3af" font-size="9" font-family="Inter,sans-serif" transform="rotate(-90,12,${padT+chartH/2})">BATERÍA %</text>
  </svg>
  <div style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;"><div style="width:10px;height:10px;border-radius:50%;background:#22c55e;"></div>Alta ≥80%</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;"><div style="width:10px;height:10px;border-radius:50%;background:#f59e0b;"></div>Media 50–79%</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;"><div style="width:10px;height:10px;border-radius:50%;background:#ef4444;"></div>Baja 20–49%</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;"><div style="width:10px;height:10px;border-radius:50%;background:#7f1d1d;"></div>Crítica &lt;20%</div>
    <div style="margin-left:auto;font-size:10px;color:#9ca3af;">${n} registros · Hover para detalles</div>
  </div>
</div>`;
}

function generarInformeDispositivo(datos, htmlFuente, analisis) {
  const fecha    = new Date();
  const fechaStr = fecha.toLocaleDateString("es-CO",{day:"2-digit",month:"long",year:"numeric"});
  const horaStr  = fecha.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  const { nombre, serial, modelo, fabricante, estado, bateria, negocio, ultimaConex, lat, lng, puntosGPS, puntosBat, puntosRed } = datos;

  const conectado = estado && estado.toLowerCase().includes("línea") || estado === "Conectado";
  const estadoColor = conectado ? "#22c55e" : "#ef4444";
  const estadoLabel = conectado ? "🟢 En línea" : "🔴 Desconectado";

  const batColor = bateria >= 60 ? "#22c55e" : bateria >= 30 ? "#f59e0b" : "#ef4444";
  const batIcon  = bateria >= 80 ? "🔋" : bateria >= 50 ? "🔌" : bateria >= 20 ? "⚠️" : "🪴";
  const batPct   = bateria != null ? bateria : 0;
  const batStr   = bateria != null ? `${bateria}%` : "N/D";

  const analisisHtml = analisis
    ? `<p style="line-height:1.85;color:#374151;">${analisis.replace(/\n/g,"<br><br>")}</p>`
    : `<p style="color:#9ca3af;font-style:italic;">Análisis no disponible.</p>`;

  // ── Sección batería (pre-calculada antes del template) ────────────
  const seccionBateria = (() => {
    const bat = puntosBat && puntosBat.length >= 2 ? puntosBat : null;
    if (!bat) return "";
    const n=bat.length,svgW=680,svgH=210,padL=46,padR=18,padT=20,padB=52;
    const chartW=svgW-padL-padR,chartH=svgH-padT-padB;
    const xS=i=>padL+(i/(n-1))*chartW,yS=v=>padT+chartH-(Math.min(100,Math.max(0,v))/100)*chartH;
    let refLines="";
    [{v:80,c:"#22c55e",l:"80%"},{v:50,c:"#f59e0b",l:"50%"},{v:20,c:"#ef4444",l:"20%"}].forEach(r=>{const y=yS(r.v);refLines+='<line x1="'+padL+'" y1="'+y+'" x2="'+(svgW-padR)+'" y2="'+y+'" stroke="'+r.c+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.45"/><text x="'+(padL-4)+'" y="'+(y+4)+'" text-anchor="end" fill="'+r.c+'" font-size="9" font-family="Inter,sans-serif" font-weight="600">'+r.l+'</text>';});
    const poly=bat.map((p,i)=>xS(i)+","+yS(p.bateria)).join(" ");
    const area="M"+xS(0)+","+yS(bat[0].bateria)+" "+bat.slice(1).map((p,i)=>"L"+xS(i+1)+","+yS(p.bateria)).join(" ")+" L"+xS(n-1)+","+(padT+chartH)+" L"+xS(0)+","+(padT+chartH)+" Z";
    const avg=bat.reduce((s,p)=>s+p.bateria,0)/n,lc=avg>=50?"#22c55e":avg>=20?"#f59e0b":"#ef4444";
    let pts="",xLbls="";
    bat.forEach((p,i)=>{const cx=xS(i),cy=yS(p.bateria),col=p.bateria>=80?"#16a34a":p.bateria>=50?"#d97706":p.bateria>=20?"#dc2626":"#7f1d1d";pts+='<circle cx="'+cx+'" cy="'+cy+'" r="4.5" fill="'+col+'" stroke="white" stroke-width="1.5"><title>'+p.fecha+': '+p.bateria+'% ('+p.nivel+')</title></circle>';if(i===0||i===n-1||i%4===0){const anc=i===0?"start":i===n-1?"end":"middle";pts+='<text x="'+cx+'" y="'+(cy-9)+'" text-anchor="'+anc+'" fill="'+col+'" font-size="9" font-weight="700" font-family="Inter,sans-serif">'+p.bateria+'%</text>';}});
    [...new Set([0,Math.floor(n/4),Math.floor(n/2),Math.floor(3*n/4),n-1])].forEach(i=>{const p=bat[i];if(!p)return;const short=p.fecha.includes(",")?p.fecha.split(",")[1].trim():p.fecha;xLbls+='<text x="'+xS(i)+'" y="'+(svgH-6)+'" text-anchor="middle" fill="#9ca3af" font-size="9" font-family="Inter,sans-serif">'+short+'</text>';});
    return '<div><div class="stitle">Historial de Batería</div>' + '<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:20px;overflow-x:auto;"><div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:12px;">Evolución del nivel de batería — últimos '+n+' registros</div><svg viewBox="0 0 '+svgW+' '+svgH+'" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:320px;"><rect x="'+padL+'" y="'+padT+'" width="'+chartW+'" height="'+chartH+'" fill="white" rx="4" stroke="#f1f5f9" stroke-width="1"/>'+refLines+'<path d="'+area+'" fill="'+lc+'" opacity="0.07"/><polyline points="'+poly+'" fill="none" stroke="'+lc+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+pts+'<line x1="'+padL+'" y1="'+padT+'" x2="'+padL+'" y2="'+(padT+chartH)+'" stroke="#e5e7eb" stroke-width="1"/><line x1="'+padL+'" y1="'+(padT+chartH)+'" x2="'+(svgW-padR)+'" y2="'+(padT+chartH)+'" stroke="#e5e7eb" stroke-width="1"/>'+xLbls+'<text x="12" y="'+(padT+chartH/2)+'" text-anchor="middle" fill="#9ca3af" font-size="9" font-family="Inter,sans-serif" transform="rotate(-90,12,'+(padT+chartH/2)+')">BATERÍA %</text></svg><div style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;"><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;"><div style="width:10px;height:10px;border-radius:50%;background:#22c55e;"></div>Alta ≥80%</div><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;"><div style="width:10px;height:10px;border-radius:50%;background:#f59e0b;"></div>Media 50–79%</div><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;"><div style="width:10px;height:10px;border-radius:50%;background:#ef4444;"></div>Baja 20–49%</div><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;"><div style="width:10px;height:10px;border-radius:50%;background:#7f1d1d;"></div>Crítica &lt;20%</div><div style="margin-left:auto;font-size:10px;color:#9ca3af;">'+n+' registros · Hover para detalles</div></div></div>';
  })();

  // ── Sección red (pre-calculada antes del template) ─────────────────
  const seccionRed = (() => {
    const red = puntosRed && puntosRed.length > 0 ? puntosRed : null;

    const avgDbm=validos.length?validos.reduce((s,r)=>s+r.signal_dbm,0)/validos.length:-70;
    const dbmAvg=validos.length?Math.round(avgDbm):null,lc=avgDbm>=-60?"#22c55e":avgDbm>=-75?"#f59e0b":"#ef4444";
    let filas="";
    red.forEach((r,i)=>{const esU=i===n-1,it=r.tipo_conexion==="WiFi"?"📶":"📡",dbm=r.signal_dbm,colS=dbm>=-50?"#16a34a":dbm>=-60?"#22c55e":dbm>=-70?"#84cc16":dbm>=-80?"#f59e0b":dbm>=-90?"#ef4444":"#7f1d1d";filas+="<tr style='"+(esU?"background:#f0fdf4;font-weight:600;":"")+"'><td style='font-size:11px;color:#6b7280;'>"+(i+1)+"</td><td style='font-size:11px;'>"+r.fecha+"</td><td>"+it+" "+r.tipo_conexion+"</td><td style='font-family:monospace;color:"+colS+";font-weight:700;'>"+dbm+" dBm</td><td style='color:"+colS+";font-size:12px;'>"+r.calidad_senal+"</td><td style='font-size:11px;color:#6b7280;'>"+(r.red_wifi||r.operador||"—")+"</td><td style='font-size:11px;color:#6b7280;font-family:monospace;'>"+(r.direccion_ip||"—")+"</td></tr>";});
    let svgHtml="";

      const xS=i=>padL+(i/(nV-1))*chartW,yS=v=>padT+chartH-((Math.min(maxV,Math.max(minV,v))-minV)/(maxV-minV))*chartH;
      const bandas=[{from:-50,to:-40,color:"#dcfce7"},{from:-60,to:-50,color:"#d1fae5"},{from:-70,to:-60,color:"#fef9c3"},{from:-80,to:-70,color:"#ffedd5"},{from:-90,to:-80,color:"#fee2e2"},{from:-100,to:-90,color:"#fecaca"}];
      let bandasSvg="";bandas.forEach(b=>{const y1=yS(b.to),y2=yS(b.from);bandasSvg+="<rect x='"+padL+"' y='"+y1+"' width='"+chartW+"' height='"+(y2-y1)+"' fill='"+b.color+"' opacity='0.5'/><text x='"+(padL-4)+"' y='"+(((y1+y2)/2)+4)+"' text-anchor='end' fill='#9ca3af' font-size='8' font-family='Inter,sans-serif'>"+b.to+"</text>";});

// MODAL DE INFORME

function InformeModal({ msg, onClose }) {
  const tipoInforme   = detectarTipoInforme(msg);
  const [fase, setFase]     = useState("init");
  const [informeHtml, setInformeHtml] = useState("");
  const [errorMsg, setErrorMsg]       = useState("");
  const iframeRef = useRef(null);
  const isDispositivo = tipoInforme === "dispositivo";
  const serial = isDispositivo ? parsearDatosDispositivo(msg).serial : "";
  const nombreArchivo = isDispositivo
    ? `Informe_Dispositivo_${serial}_${new Date().toISOString().slice(0,10)}.html`
    : `Informe_Flota_${new Date().toISOString().slice(0,10)}.html`;

  useEffect(() => { lanzarGeneracion(); }, []);

  async function lanzarGeneracion() {
    setFase("loading");
    try {
      const iData = msg.informe_data || null;
      let final   = "";
      if (isDispositivo) {
        const datos    = parsearDatosDispositivo(msg);
        const analisis = await generarAnalisisIA("dispositivo", iData);
        final = generarInformeDispositivo(datos, msg.html || "", analisis);
      } else {
        const metricas = parsearMetricasFlota(msg.html, iData);
        const analisis  = await generarAnalisisIA("flota", iData);
        final = generarInformeFlota(msg.html, analisis, iData);
      }
      setInformeHtml(final);
      setFase("listo");
    } catch(err) {
      console.error(err);
      setErrorMsg(err.message);
      setFase("error");
    }
  }

  function abrirEnPestana() {
    const win = window.open("","_blank");
    if (win) { win.document.write(informeHtml); win.document.close(); }
  }

  function generarSinIA() {
    const iData = msg.informe_data || null;
    let final = "";
    if (isDispositivo) {
      const datos = parsearDatosDispositivo(msg);
      final = generarInformeDispositivo(datos, msg.html || "", "");
    } else {
      final = generarInformeFlota(msg.html, "", iData);
    }
    setInformeHtml(final);
    setFase("listo");
  }

  useEffect(() => {
    if (fase === "listo" && iframeRef.current && informeHtml) {
      const doc = iframeRef.current.contentDocument || iframeRef.current.contentWindow.document;
      doc.open(); doc.write(informeHtml); doc.close();
    }
  }, [fase, informeHtml]);

  const tipoLabel = isDispositivo ? `📱 Dispositivo${serial ? " · " + serial : ""}` : "📊 Flota";

  return (
    <div className="modal-overlay" onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-box">
        <div className="modal-header">
          <div className="modal-title">
            <span style={{fontSize:"18px"}}>📄</span>
            Informe Técnico
            <span style={{fontSize:"11px",background:"rgba(79,142,247,.15)",color:"#4f8ef7",border:"1px solid rgba(79,142,247,.3)",borderRadius:"20px",padding:"2px 10px",fontWeight:600}}>
              {tipoLabel}
            </span>

function MapMessage({ lat, lng, name, history }) {
  const containerRef=useRef(null); const mapRef=useRef(null);
  const googleMapsUrl=`https://www.google.com/maps?q=${lat},${lng}`;
  useEffect(() => {
    if (!containerRef.current||typeof L==="undefined") return;
    if (mapRef.current){mapRef.current.remove();mapRef.current=null;}
    const puntos=history&&history.length>0?history:[{lat,lng,fecha:"",num:1}];
    const map=L.map(containerRef.current,{zoomControl:true}).setView([puntos[0].lat,puntos[0].lng],15);
    L.tileLayer("https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}",{attribution:"© Google Maps",maxZoom:20}).addTo(map);
    if (puntos.length>1){const ll=puntos.map(p=>[p.lat,p.lng]);L.polyline(ll,{color:"#bbd531",weight:2,opacity:.6,dashArray:"5,5"}).addTo(map);L.polyline(ll,{color:"#ef4444",weight:3,opacity:.8,dashArray:"6,4"}).addTo(map);}
    const iU=L.divIcon({className:"",html:`<div style="background:#bbd531;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 6px rgba(187,213,49,.8);"></div>`,iconSize:[14,14],iconAnchor:[7,7]});
    const iN=L.divIcon({className:"",html:`<div style="background:#4f8ef7;width:9px;height:9px;border-radius:50%;border:1px solid #fff;opacity:.8;"></div>`,iconSize:[9,9],iconAnchor:[4,4]});
    puntos.forEach((p,idx)=>{const esU=idx===0;const m=L.marker([p.lat,p.lng],{icon:esU?iU:iN}).addTo(map);m.bindPopup(`<b>${esU?"🟢 Último punto":"Punto "+p.num}</b><br>📅 ${p.fecha}<br>📍 ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}<br><a href="https://www.google.com/maps?q=${p.lat},${p.lng}" target="_blank" style="color:#4285F4;">Ver en Google Maps</a>`);if(esU)m.openPopup();});
    if(puntos.length>1){const b=L.latLngBounds(puntos.map(p=>[p.lat,p.lng]));map.fitBounds(b,{padding:[30,30]});}
    mapRef.current=map;
    return ()=>{if(mapRef.current){mapRef.current.remove();mapRef.current=null;}};
  },[lat,lng,name,history]);
  return (
    <div>
      <div ref={containerRef} className="map-container" style={{height:"300px"}}/>
      <a href={googleMapsUrl} target="_blank" rel="noopener noreferrer"
        style={{display:"inline-block",marginTop:"8px",padding:"6px 14px",background:"#4285F4",color:"#fff",borderRadius:"6px",textDecoration:"none",fontSize:"12px"}}>
        🗺️ Abrir último punto en Google Maps
      </a>
    </div>
  );
}

// AUDIO BUTTON — Grabación + Whisper via n8n
// ════════════════════════════════════════════════════════════════════
function AudioButton({ onTranscript, disabled }) {
  const [status, setStatus] = useState("idle"); // idle | recording | transcribing
  const [toast, setToast]   = useState("");
  const mediaRecRef  = useRef(null);
  const chunksRef    = useRef([]);
  const timerRef     = useRef(null);

  const showToast = (msg, ms=2500) => {
    setToast(msg);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(()=>setToast(""), ms);
  };

  const startRecording = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunksRef.current = [];
      const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
        ? "audio/webm;codecs=opus"
        : MediaRecorder.isTypeSupported("audio/mp4") ? "audio/mp4" : "audio/webm";
      const rec = new MediaRecorder(stream, { mimeType });
      rec.ondataavailable = e => { if(e.data.size>0) chunksRef.current.push(e.data); };
      rec.onstop = () => {
        stream.getTracks().forEach(t=>t.stop());
        const blob = new Blob(chunksRef.current, { type: mimeType });
        sendToWhisper(blob, mimeType);
      };
      rec.start(200);
      mediaRecRef.current = rec;
      setStatus("recording");
      showToast("🔴 Grabando… toca de nuevo para enviar", 60000);
    } catch(err) {
      showToast("⚠️ Sin acceso al micrófono");
    }
  };

  const stopRecording = () => {
    if(mediaRecRef.current && mediaRecRef.current.state !== "inactive") {
      mediaRecRef.current.stop();
      setStatus("transcribing");
      showToast("⏳ Transcribiendo Audio...", 15000);
    }
  };

  const sendToWhisper = async (blob, mimeType) => {
    const ext = mimeType.includes("mp4") ? "m4a" : "webm";
    const formData = new FormData();
    formData.append("audio", blob, `voice.${ext}`);
    try {
      const res = await fetch(`${API_BASE}/webhook/api/transcribe`, { method:"POST", body: formData });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const raw = await res.text();
      if(!raw || !raw.trim()) { showToast("⚠️ El servidor no respondió nada"); return; }
      let data;
      try { data = JSON.parse(raw); }
      catch(e) { showToast("⚠️ Respuesta inválida del servidor"); return; }
      const text = (data.text||"").trim();
      if(text) { onTranscript(text); }
      else showToast("⚠️ No se detectó voz");
    } catch(err) {
      showToast(`⚠️ ${err.message}`);
    } finally {
      setStatus("idle");
    }
  };

  const handleClick = () => {
    if(status==="idle") startRecording();
    else if(status==="recording") stopRecording();
  };

  const micIcon = (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="White" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="9" y="2" width="6" height="11" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
    </svg>
  );
  const stopIcon = (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
      <rect x="4" y="4" width="16" height="16" rx="2"/>
    </svg>
  );
  const spinIcon = (
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round">
      <path d="M12 2a10 10 0 0 1 10 10"/>
    </svg>
  );

  return (
    <div style={{position:"relative",flexShrink:0}}>
      <button
        className={`audio-btn ${status}`}
        onClick={handleClick}
        disabled={disabled||status==="transcribing"}
        title={status==="idle"?"Grabar voz":status==="recording"?"Detener grabación":"Transcribiendo…"}
      >
        {status==="recording" ? stopIcon : status==="transcribing" ? spinIcon : micIcon}
      </button>
      {toast && <div className="audio-toast">{toast}</div>}
    </div>
  );
}

// TRANSFORMAR HINTS CLICKEABLES
// Convierte los td con 💡 "..." en spans clickeables
// ════════════════════════════════════════════════════════════════════
function transformarHints(htmlStr) {
  if (!htmlStr) return htmlStr;
  // Patrón: 💡 Para ver seriales pregunta: <i>"Lista los ..."</i>
  // o:      💡 Para ver seriales: <i>"Lista los ..."</i>
  return htmlStr.replace(
    /💡\s*(Para ver[^<]*:?\s*)<i>"([^"]+)"<\/i>/g,
    (match, prefix, query) => {
      const escaped = query.replace(/"/g, '&quot;');
      return '<span class="hint-clickable" data-query="' + escaped + '">'
           + '<span class="hint-icon">💡</span>'
           + prefix + '<b>' + query + '</b>'
           + '</span>';
    }
  );
}

// APP
// ════════════════════════════════════════════════════════════════════
function App() {
  const [currentUser, setCurrentUser] = useState(() => getSession());
  const [sessions,setSessions]=useState(()=>loadSessions());
  const [activeChatId,setActiveChatId]=useState(null);
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [activeMode,setActiveMode]=useState("free");
  const bottomRef=useRef(null); const textareaRef=useRef(null);
  const activeChatIdRef=useRef(null); const activeModeRef=useRef("free");

  // Si hay sesión activa, configurar CLIENTE_CONFIG global
  useEffect(() => {
    if (currentUser) {
      CLIENTE_CONFIG = currentUser.cliente;
    }
  }, [currentUser]);

  const handleLogin = (user) => {
    CLIENTE_CONFIG = user.cliente;
    setCurrentUser(user);
    setSessions([]);
    setMessages([]);
    setActiveChatId(null);
  };

  const handleLogout = () => {
    clearSession();
    CLIENTE_CONFIG = null;
    setCurrentUser(null);
    setSessions([]);
    setMessages([]);
    setActiveChatId(null);
  };

  if (!currentUser) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  // Envía el texto transcripto directo al chat (no pasa por el textarea)
  const handleTranscript = useCallback((text) => {
    sendMessage(text);
  }, [sendMessage]);

  useEffect(()=>{activeChatIdRef.current=activeChatId;},[activeChatId]);
  useEffect(()=>{activeModeRef.current=activeMode;},[activeMode]);
  useEffect(()=>{saveSessions(sessions);},[sessions]);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,loading]);

  const startNewChat=()=>{setMessages([]);setActiveChatId(null);};
  const loadChat=s=>{setMessages(s.messages.map(m=>({...m,time:new Date(m.time)})));setActiveChatId(s.id);};
  const deleteChat=(e,id)=>{e.stopPropagation();setSessions(p=>p.filter(s=>s.id!==id));if(activeChatIdRef.current===id){setMessages([]);setActiveChatId(null);}};

  const sendMessage=useCallback(async(text,modeOverride)=>{
    const rawContent=(text||input).trim();
    if(!rawContent||loading) return;
    const mode=modeOverride||activeModeRef.current;
    const currentMode=MODES.find(m=>m.id===mode)||MODES[0];
    let apiMessage=rawContent;
    if(mode==="location")  apiMessage=`ubicación serial: ${rawContent}`;
    else if(mode==="battery")   apiMessage=`batería serial: ${rawContent}`;
    else if(mode==="inventory") apiMessage=`lista dispositivos ${rawContent}`;
    const prefix=currentMode.id!=="free"?`${currentMode.icon} `:"";
    const userMsg={role:"user",content:prefix+rawContent,html:null,time:new Date()};
    setMessages(p=>[...p,userMsg]); setInput(""); setLoading(true);
    if(textareaRef.current) textareaRef.current.style.height="auto";
    let botMsg;
    try {
      const history=messages
        .filter(m => {
          const c = m.content || "";
          return !m.isError && !c.includes("⚠️") && !c.includes("Error al conectar") && c.trim() !== "";
        })
        .slice(-6)
        .map(m=>({role:m.role==="bot"?"assistant":"user",content:m.content||(m.html?"[respuesta anterior]":"")}))
        .filter(m => m.content.trim() !== "");
      const res=await fetch(`${API_BASE}/webhook/api/chat`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        message:apiMessage,history,mode,
        cliente_path:       CLIENTE_CONFIG.path,
        cliente_nombre:     CLIENTE_CONFIG.nombre,
        cliente_negocios:   CLIENTE_CONFIG.negocios,
        cliente_regionales: CLIENTE_CONFIG.regionales,
      })});
      const raw=await res.text();
      if(!raw||!raw.trim()) throw new Error(`El servidor respondió vacío (HTTP ${res.status}) — revisa el flujo en n8n`);
      if(!res.ok) throw new Error(`HTTP ${res.status}: ${raw.slice(0,200)}`);
      let data;
      try { data=JSON.parse(raw); }
      catch(e) { throw new Error(`Respuesta no es JSON válido: ${raw.slice(0,200)}`); }
      botMsg={role:"bot",content:data.text||"",html:transformarHints(data.html||null),map:data.map||null,battery:data.battery||null,informe_data:data.informe_data||null,isError:false,time:new Date()};
    } catch(err){
      botMsg={role:"bot",content:`⚠️ ${err.message}`,html:null,map:null,battery:null,isError:true,time:new Date()};
    }
    setMessages(prev=>{
      const updated=[...prev,botMsg];
      const currentId=activeChatIdRef.current;
      const title=rawContent.slice(0,45)+(rawContent.length>45?"…":"");
      // No guardar en sesión si fue un error
      if(!botMsg.isError){
        setSessions(ps=>{
          if(currentId) return ps.map(s=>s.id===currentId?{...s,messages:updated,updatedAt:Date.now()}:s);
          const newId=genId(); activeChatIdRef.current=newId; setActiveChatId(newId);
          return [{id:newId,title,messages:updated,updatedAt:Date.now()},...ps];
        });
      }
      return updated;
    });
    setLoading(false);
  },[input,loading,messages]);

  const handleModeSelect=modeId=>{setActiveMode(modeId);const m=MODES.find(x=>x.id===modeId);if(m?.autoQuery)sendMessage(m.autoQuery,modeId);};
  const handleKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}};
  const handleTextarea=e=>{setInput(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";};

  const isEmpty=messages.length===0;
  const currentMode=MODES.find(m=>m.id===activeMode)||MODES[0];
  const placeholder=activeMode!=="free"?currentMode.hint:"Escribe tu consulta… (Enter para enviar, Shift+Enter para saltar línea)";

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo"><img src="https://b2kmnbrlfbl9jvgp.public.blob.vercel-storage.com/sofIAlogo.jpg" alt="sofIA" className="logo-img"/></div>
        <button className="new-chat-btn" onClick={startNewChat}><span>&#xFF0B;</span> Nueva consulta</button>
        <div><p className="sidebar-section-title">Recientes</p></div>
        <div className="chat-history">
          {sessions.length===0&&<p style={{fontSize:"12px",color:"var(--text-muted)",padding:"8px 12px"}}>Sin conversaciones guardadas</p>}
          {sessions.map(s=>(
            <div key={s.id} className={`history-item ${s.id===activeChatId?"active":""}`} onClick={()=>loadChat(s)}>
              <span className="history-item-text">💬 {s.title}</span>
              <button className="history-delete-btn" onClick={e=>deleteChat(e,s.id)} title="Eliminar">×</button>
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="avatar" style={{background:'linear-gradient(135deg,'+currentUser.color+'33,'+currentUser.color+'66)',color:currentUser.color,border:'1px solid '+currentUser.color+'44'}}>{currentUser.avatar}</div>
          <div className="user-info"><div className="user-name">{currentUser.nombre}</div><div className="user-role" style={{color:currentUser.color+'cc'}}>{currentUser.cliente.nombre}</div></div>
          <button onClick={handleLogout} title="Cerrar sesión" style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',fontSize:'18px',lineHeight:1,padding:'4px',borderRadius:'6px',transition:'color .15s'}} onMouseEnter={e=>e.target.style.color='#ef4444'} onMouseLeave={e=>e.target.style.color='var(--text-muted)'}>⏏</button>
        </div>
      </aside>

      <main className="chat-main">
        <header className="chat-header">
          <div><div className="chat-header-title">Asistente SOTI</div><div className="chat-header-sub">Consultas en lenguaje natural</div></div>
          <div className="status-badge"><span className="status-dot"/> Conectado</div>
        </header>

        <div className="messages-area">
          {isEmpty ? (
            <div className="welcome">
              <div className="welcome-icon"><img src="https://th.bing.com/th/id/OIP.2j7fyal32zIJfnngWk45jAHaFH?w=222&h=185&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3" alt="SofIA" style={{width:"100%",height:"100%",objectFit:"contain",borderRadius:"20px"}}/></div>
              <h2>Hola, ¿en qué puedo ayudarte?</h2>
              <p>Soy tu asistente para consultar la base de datos GPS. Puedes preguntarme sobre dispositivos, ubicaciones y más.</p>
              <div className="suggestions">
                {SUGGESTIONS.map((s,i)=><button key={i} className="suggestion-chip" onClick={()=>sendMessage(s)}>{s}</button>)}
              </div>
            </div>
          ) : messages.map((m,i)=><MessageBubble key={i} msg={m} onSendMessage={sendMessage}/>)}
          {loading&&<TypingBubble/>}
          <div ref={bottomRef}/>
        </div>

        <div className="input-area">
          {activeMode!=="free"&&(
            <div style={{marginBottom:"8px"}}>
              <span className="mode-badge">{currentMode.icon} {currentMode.label}
                <button className="mode-badge-close" onClick={()=>setActiveMode("free")} title="Volver al modo libre">×</button>
              </span>
            </div>
          )}
          <div className="input-wrapper">
            <ModeSelector activeMode={activeMode} onSelect={handleModeSelect}/>
            <AudioButton onTranscript={handleTranscript} disabled={loading}/>
            <textarea ref={textareaRef} className="chat-input" placeholder={placeholder} value={input} onChange={handleTextarea} onKeyDown={handleKey} rows={1}/>
            <button className="send-btn" onClick={()=>sendMessage()} disabled={!input.trim()||loading} title="Enviar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
          <p className="input-hint">SofIA puede cometer errores. Verifica información crítica.</p>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
