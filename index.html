
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SofIA</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:     #0d0f14;
      --bg-sidebar:  #13161e;
      --bg-card:     #1a1d27;
      --bg-input:    #20243a;
      --accent:      #bbd531;
      --accent-dim:  #2d5cb8;
      --text-main:   #e8eaf0;
      --text-muted:  #6b7280;
      --text-dim:    #9ca3af;
      --bubble-user: #1e3a6e;
      --bubble-bot:  #1a1d27;
      --border:      #2a2d3e;
      --shadow:      0 4px 24px rgba(0,0,0,0.4);
      --radius:      14px;
    }

    html, body, #root { height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg-base); color: var(--text-main); }

    .app { display: flex; height: 100vh; overflow: hidden; }

    .sidebar {
      width: 260px; min-width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 20px 16px;
      gap: 24px;
    }
    .sidebar-logo { display: flex; align-items: center; padding: 4px 8px; justify-content: center;}
    .logo-img { height: 140px; width: auto; filter: brightness(0) invert(1); object-fit: contain; }

    .new-chat-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text-main); border-radius: 10px;
      padding: 10px 14px; cursor: pointer;
      font-size: 14px; font-weight: 500; transition: all .15s;
    }
    .new-chat-btn:hover { background: var(--bg-card); border-color: var(--accent); }

    .sidebar-section-title {
      font-size: 11px; font-weight: 600; letter-spacing: .8px;
      text-transform: uppercase; color: var(--text-muted);
      padding: 0 8px;
    }

    .chat-history { display: flex; flex-direction: column; gap: 4px; flex: 1; overflow-y: auto; }
    .history-item {
      padding: 9px 12px; border-radius: 8px; cursor: pointer;
      font-size: 13px; color: var(--text-dim);
      overflow: hidden; transition: background .15s;
      display: flex; align-items: center; gap: 4px;
    }
    .history-item:hover { background: var(--bg-card); color: var(--text-main); }
    .history-item.active { background: var(--bg-input); color: var(--text-main); }
    .history-item-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-delete-btn {
      flex-shrink: 0; background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 17px; line-height: 1;
      padding: 0 2px; border-radius: 4px;
      opacity: 0; transition: opacity .15s, color .15s;
    }
    .history-item:hover .history-delete-btn { opacity: 1; }
    .history-delete-btn:hover { color: #ef4444; }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding-top: 16px; display: flex; align-items: center; gap: 10px;
    }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, #171352, #303483);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; flex-shrink: 0;
    }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-size: 13px; font-weight: 600; }
    .user-role { font-size: 11px; color: var(--text-muted); }

    .chat-main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }

    .chat-header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-base);
      display: flex; align-items: center; justify-content: space-between;
    }
    .chat-header-title { font-size: 15px; font-weight: 600; }
    .chat-header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #bbd531;
      background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.2);
      border-radius: 20px; padding: 4px 12px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #bbd531; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .messages-area {
      flex: 1; overflow-y: auto; padding: 28px;
      display: flex; flex-direction: column; gap: 20px;
      scroll-behavior: smooth;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; gap: 16px; text-align: center; padding: 40px;
    }
    .welcome-icon {
      width: 64px; height: 64px; border-radius: 20px;
      background: linear-gradient(135deg, #ffffff, #ffffff);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 8px;
    }
    .welcome h2 { font-size: 22px; font-weight: 700; }
    .welcome p { color: var(--text-muted); font-size: 14px; max-width: 400px; line-height: 1.6; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 8px; }
    .suggestion-chip {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 16px; font-size: 13px;
      cursor: pointer; color: var(--text-dim); transition: all .15s;
    }
    .suggestion-chip:hover { border-color: var(--accent); color: var(--text-main); background: var(--bg-input); }

    .msg-row { display: flex; gap: 12px; align-items: flex-start; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .msg-avatar.bot-av { background: linear-gradient(135deg, #4f8ef7, #7c5cfc); margin-top: 2px; }
    .msg-avatar.user-av { background: var(--bubble-user); border: 1px solid var(--accent-dim); }

    .bubble {
      max-width: 70%; padding: 12px 16px; border-radius: 16px;
      font-size: 14px; line-height: 1.65; word-break: break-word;
    }
    .bubble.user-bubble {
      background: var(--bubble-user);
      border: 1px solid var(--accent-dim);
      border-bottom-right-radius: 4px;
      color: var(--text-main);
    }
    .bubble.bot-bubble {
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .bubble table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
    .bubble th { background: rgba(79,142,247,.15); color: var(--accent); font-weight: 600; padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
    .bubble td { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,.04); }
    .bubble tr:last-child td { border-bottom: none; }
    .bubble tr:hover td { background: rgba(255,255,255,.03); }

    .typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .4; animation: blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.4} 40%{opacity:1} }

    .input-area {
      padding: 16px 28px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-base);
    }
    .input-wrapper {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 14px; padding: 10px 14px;
      transition: border-color .15s;
    }
    .input-wrapper:focus-within { border-color: var(--accent); }
    .chat-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text-main); font-size: 14px; resize: none;
      line-height: 1.5; max-height: 120px; font-family: inherit;
    }
    .chat-input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; color: white;
    }
    .send-btn:hover { background: var(--accent-dim); }
    .send-btn:disabled { background: var(--bg-card); cursor: not-allowed; opacity: .5; }
    .input-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; }

    .input-area { position: relative; }
    .mode-btn {
      width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      cursor: pointer; font-size: 16px; display: flex;
      align-items: center; justify-content: center; transition: all .15s;
    }
    .mode-btn:hover { border-color: var(--accent); }
    .mode-btn.mode-btn-active { border-color: var(--accent); background: rgba(187,213,49,.12); }
    .mode-popup {
      position: absolute; bottom: calc(100% + 8px); left: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px; z-index: 100;
      box-shadow: var(--shadow); min-width: 260px;
    }
    .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .mode-option {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 6px; border-radius: 10px; cursor: pointer;
      background: var(--bg-input); border: 1px solid transparent;
      transition: all .15s; color: var(--text-dim);
    }
    .mode-option:hover { border-color: var(--border); color: var(--text-main); }
    .mode-option.mode-option-active { border-color: var(--accent); color: var(--text-main); background: rgba(187,213,49,.1); }
    .mode-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(187,213,49,.1); border: 1px solid rgba(187,213,49,.3);
      border-radius: 20px; padding: 3px 10px; font-size: 12px;
      color: var(--accent); margin-bottom: 8px;
    }
    .mode-badge-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 14px; line-height: 1; padding: 0; margin-left: 2px;
    }
    .mode-badge-close:hover { color: var(--text-main); }
    .battery-bar-track { background: var(--border); border-radius: 6px; height: 10px; overflow: hidden; flex: 1; }
    .battery-bar-fill { height: 100%; border-radius: 6px; transition: width .6s ease; }
    .map-container { height: 200px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .leaflet-container { font-family: inherit !important; font-size: 13px !important; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .messages-area { padding: 16px; }
      .input-area { padding: 12px 16px 16px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

// ─── ÚNICA LÍNEA A CAMBIAR: apunta a tu n8n con Caddy ───
const API_BASE = "https://n8ntest.istreetlab.com";

const { useState, useRef, useEffect, useCallback } = React;

const BOT_AVATAR = "🧠";
const USER_AVATAR = "🧑‍💻";
const STORAGE_KEY = "sofia_chats";

const MODES = [
  { id: "free",      icon: "💬", label: "Libre",      hint: "Escribe tu consulta…",                autoQuery: null },
  { id: "location",  icon: "📍", label: "Ubicación",  hint: "Escribe el serial del dispositivo…",  autoQuery: null },
  { id: "battery",   icon: "🔋", label: "Batería",    hint: "Escribe el serial del dispositivo…",  autoQuery: null },
  { id: "alerts",    icon: "🚨", label: "Alertas",    hint: "Buscando alertas activas…",           autoQuery: "alertas activas" },
  { id: "inventory", icon: "📋", label: "Inventario", hint: "Filtra por nombre o modelo…",         autoQuery: null },
  { id: "users",     icon: "👤", label: "Usuarios",   hint: "Consultando usuarios…",               autoQuery: "lista de usuarios" },
];

const SUGGESTIONS = [
  "¿Cuántos dispositivos hay registrados?",
  "¿Cuáles máquinas llevan más de 3 días sin conexión?",
  "¿Cuáles máquinas comenzaron hoy a las 6:45 con batería inferior al 80%?",
  "¿Qué dispositivos hay de la marca Motorola?",
];

function formatTime(date) {
  return new Date(date).toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch { return []; }
}

function saveSessions(sessions) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); } catch {}
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br/>");
}

function TypingBubble() {
  return (
    <div className="msg-row">
      <div className="msg-avatar bot-av">{BOT_AVATAR}</div>
      <div className="bubble bot-bubble">
        <div className="typing"><span /><span /><span /></div>
      </div>
    </div>
  );
}

function BatteryBar({ level, name, model, lastSeen, serial, online_raw, estado }) {
  const pct = level != null ? Math.min(100, Math.max(0, level)) : 0;
  const color = pct >= 60 ? "#bbd531" : pct >= 30 ? "#f59e0b" : "#ef4444";
  const icon = pct >= 80 ? "🔋" : pct >= 50 ? "🔌" : pct >= 20 ? "⚠️" : "🪴";
  // online_raw puede ser 1/0 o true/false; estado puede ser 'Conectado'/'Desconectado'
  const conectado = online_raw === 1 || online_raw === true || estado === "Conectado";
  const estadoLabel = conectado ? "🟢 En línea" : "🔴 Desconectado";
  // lastSeen ya viene formateado como string desde n8n — no re-parsear con new Date()
  const fechaMostrar = lastSeen && lastSeen !== "N/D" ? lastSeen : "Desconocida";
  return (
    <div>
      <p style={{ fontWeight: 600, fontSize: "15px" }}>{icon} {name}</p>
      <p style={{ fontSize: "12px", color: "var(--text-muted)", marginTop: "2px" }}>{model} · Serial: {serial}</p>
      <p style={{ fontSize: "13px", marginTop: "6px" }}>{estadoLabel}</p>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginTop: "10px" }}>
        <div className="battery-bar-track">
          <div className="battery-bar-fill" style={{ width: `${pct}%`, background: color }} />
        </div>
        <span style={{ fontWeight: 700, fontSize: "20px", color, minWidth: "50px", textAlign: "right" }}>
          {level != null ? `${level}%` : "N/D"}
        </span>
      </div>
      <p style={{ fontSize: "12px", color: "var(--text-muted)", marginTop: "6px" }}>
        Última conexión: {fechaMostrar}
      </p>
    </div>
  );
}

function MapMessage({ lat, lng, name }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const googleMapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
  useEffect(() => {
    if (!containerRef.current || typeof L === "undefined") return;
    if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }
    const map = L.map(containerRef.current, { zoomControl: true }).setView([lat, lng], 15);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap",
    }).addTo(map);
    const marker = L.marker([lat, lng]).addTo(map);
    marker.bindPopup(`<b>${name}</b><br><a href="${googleMapsUrl}" target="_blank" style="color:#4285F4;">Abrir en Google Maps</a>`).openPopup();
    mapRef.current = map;
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, [lat, lng, name]);
  return (
    <div>
      <div ref={containerRef} className="map-container" />
      <a
        href={googleMapsUrl}
        target="_blank"
        rel="noopener noreferrer"
        style={{
          display: "inline-block", marginTop: "8px", padding: "6px 14px",
          background: "#4285F4", color: "#fff", borderRadius: "6px",
          textDecoration: "none", fontSize: "12px"
        }}
      >
        🗺️ Abrir en Google Maps
      </a>
    </div>
  );
}

function MessageBubble({ msg }) {
  const isUser = msg.role === "user";
  return (
    <div className={`msg-row ${isUser ? "user" : ""}`}>
      <div className={`msg-avatar ${isUser ? "user-av" : "bot-av"}`}>
        {isUser ? USER_AVATAR : BOT_AVATAR}
      </div>
      <div className={`bubble ${isUser ? "user-bubble" : "bot-bubble"}`}>
        {/* Siempre renderiza el HTML con la ficha completa si existe */}
        {(msg.html) && (
          <div dangerouslySetInnerHTML={{ __html: msg.html }} />
        )}
        {/* Si no hay html, muestra texto plano */}
        {!msg.html && !msg.battery && (
          <div dangerouslySetInnerHTML={{ __html: escapeHtml(msg.content) }} />
        )}
        {/* Barra de batería solo como complemento visual si viene battery Y no hay html */}
        {msg.battery && !msg.html && (
          <BatteryBar {...msg.battery} />
        )}
        {/* Mapa Leaflet debajo del contenido */}
        {msg.map && <MapMessage {...msg.map} />}
        <div className="bubble-time">{formatTime(msg.time)}</div>
      </div>
    </div>
  );
}

function ModeSelector({ activeMode, onSelect }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);
  const current = MODES.find(m => m.id === activeMode) || MODES[0];
  return (
    <div style={{ position: "relative" }} ref={wrapRef}>
      <button
        className={`mode-btn ${activeMode !== "free" ? "mode-btn-active" : ""}`}
        onClick={() => setOpen(o => !o)}
        title="Seleccionar agente"
      >
        {current.icon}
      </button>
      {open && (
        <div className="mode-popup">
          <p style={{ fontSize: "11px", fontWeight: 600, letterSpacing: ".6px", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: "10px" }}>
            Seleccionar agente
          </p>
          <div className="mode-grid">
            {MODES.map(m => (
              <button key={m.id} className={`mode-option ${activeMode === m.id ? "mode-option-active" : ""}`}
                onClick={() => { onSelect(m.id); setOpen(false); }}>
                <span style={{ fontSize: "22px" }}>{m.icon}</span>
                <span style={{ fontSize: "11px", marginTop: "4px" }}>{m.label}</span>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [sessions, setSessions] = useState(() => loadSessions());
  const [activeChatId, setActiveChatId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeMode, setActiveMode] = useState("free");
  const bottomRef = useRef(null);
  const textareaRef = useRef(null);
  const activeChatIdRef = useRef(null);
  const activeModeRef = useRef("free");

  useEffect(() => { activeChatIdRef.current = activeChatId; }, [activeChatId]);
  useEffect(() => { activeModeRef.current = activeMode; }, [activeMode]);
  useEffect(() => { saveSessions(sessions); }, [sessions]);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

  const startNewChat = () => { setMessages([]); setActiveChatId(null); };

  const loadChat = (session) => {
    setMessages(session.messages.map(m => ({ ...m, time: new Date(m.time) })));
    setActiveChatId(session.id);
  };

  const deleteChat = (e, id) => {
    e.stopPropagation();
    setSessions(prev => prev.filter(s => s.id !== id));
    if (activeChatIdRef.current === id) { setMessages([]); setActiveChatId(null); }
  };

  const sendMessage = useCallback(async (text, modeOverride) => {
    const rawContent = (text || input).trim();
    if (!rawContent || loading) return;

    const mode = modeOverride || activeModeRef.current;
    const currentMode = MODES.find(m => m.id === mode) || MODES[0];

    // Prefijos por modo para ayudar al NLP de n8n
    let apiMessage = rawContent;
    if (mode === "location")  apiMessage = `ubicación serial: ${rawContent}`;
    else if (mode === "battery")   apiMessage = `batería serial: ${rawContent}`;
    else if (mode === "inventory") apiMessage = `lista dispositivos ${rawContent}`;

    const prefix = currentMode.id !== "free" ? `${currentMode.icon} ` : "";
    const userMsg = { role: "user", content: prefix + rawContent, html: null, time: new Date() };
    setMessages(prev => [...prev, userMsg]);
    setInput("");
    setLoading(true);
    if (textareaRef.current) textareaRef.current.style.height = "auto";

    let botMsg;
    try {
      // Historial de los últimos 6 mensajes para contexto
      const history = messages.slice(-6).map(m => ({
        role: m.role === "bot" ? "assistant" : "user",
        content: m.content || (m.html ? "[respuesta anterior]" : ""),
      }));

      // ── Llamada al webhook de n8n ──
      const res = await fetch(`${API_BASE}/webhook/api/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: apiMessage, history, mode }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      botMsg = {
        role: "bot",
        content: data.text || "",
        html: data.html || null,
        map: data.map || null,
        battery: data.battery || null,
        time: new Date(),
      };
    } catch (err) {
      botMsg = {
        role: "bot",
        content: `⚠️ Error al conectar con el servidor: ${err.message}`,
        html: null, map: null, battery: null,
        time: new Date(),
      };
    }

    setMessages(prev => {
      const updated = [...prev, botMsg];
      const currentId = activeChatIdRef.current;
      const title = rawContent.slice(0, 45) + (rawContent.length > 45 ? "…" : "");
      setSessions(prevSessions => {
        if (currentId) {
          return prevSessions.map(s => s.id === currentId ? { ...s, messages: updated, updatedAt: Date.now() } : s);
        } else {
          const newId = genId();
          activeChatIdRef.current = newId;
          setActiveChatId(newId);
          return [{ id: newId, title, messages: updated, updatedAt: Date.now() }, ...prevSessions];
        }
      });
      return updated;
    });
    setLoading(false);
  }, [input, loading, messages]);

  const handleModeSelect = (modeId) => {
    setActiveMode(modeId);
    const mode = MODES.find(m => m.id === modeId);
    if (mode?.autoQuery) sendMessage(mode.autoQuery, modeId);
  };

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  const handleTextarea = (e) => {
    setInput(e.target.value);
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px";
  };

  const isEmpty = messages.length === 0;
  const currentMode = MODES.find(m => m.id === activeMode) || MODES[0];
  const placeholder = activeMode !== "free"
    ? currentMode.hint
    : "Escribe tu consulta… (Enter para enviar, Shift+Enter para saltar línea)";

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <img src="https://b2kmnbrlfbl9jvgp.public.blob.vercel-storage.com/sofia-JvIEPZpnTFdoP8APoDpX06OzGbce5c.png" alt="sofIA" className="logo-img" />
        </div>

        <button className="new-chat-btn" onClick={startNewChat}>
          <span>&#xFF0B;</span> Nueva consulta
        </button>

        <div><p className="sidebar-section-title">Recientes</p></div>
        <div className="chat-history">
          {sessions.length === 0 && (
            <p style={{fontSize:"12px",color:"var(--text-muted)",padding:"8px 12px"}}>Sin conversaciones guardadas</p>
          )}
          {sessions.map((s) => (
            <div key={s.id} className={`history-item ${s.id === activeChatId ? "active" : ""}`} onClick={() => loadChat(s)}>
              <span className="history-item-text">💬 {s.title}</span>
              <button className="history-delete-btn" onClick={(e) => deleteChat(e, s.id)} title="Eliminar">×</button>
            </div>
          ))}
        </div>

        <div className="sidebar-footer">
          <div className="avatar">A</div>
          <div className="user-info">
            <div className="user-name">Administrador</div>
            <div className="user-role">COMPUNET</div>
          </div>
        </div>
      </aside>

      <main className="chat-main">
        <header className="chat-header">
          <div>
            <div className="chat-header-title">Asistente SOTI</div>
            <div className="chat-header-sub">Consultas en lenguaje natural</div>
          </div>
          <div className="status-badge"><span className="status-dot" /> Conectado</div>
        </header>

        <div className="messages-area">
          {isEmpty ? (
            <div className="welcome">
              <div className="welcome-icon">
                <img src="https://th.bing.com/th/id/OIP.2j7fyal32zIJfnngWk45jAHaFH?w=222&h=185&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3" alt="SofIA" style={{width:"100%",height:"100%",objectFit:"contain",borderRadius:"20px"}} />
              </div>
              <h2>Hola, ¿en qué puedo ayudarte?</h2>
              <p>Soy tu asistente para consultar la base de datos GPS. Puedes preguntarme sobre dispositivos, ubicaciones y más.</p>
              <div className="suggestions">
                {SUGGESTIONS.map((s, i) => (
                  <button key={i} className="suggestion-chip" onClick={() => sendMessage(s)}>{s}</button>
                ))}
              </div>
            </div>
          ) : (
            messages.map((m, i) => <MessageBubble key={i} msg={m} />)
          )}
          {loading && <TypingBubble />}
          <div ref={bottomRef} />
        </div>

        <div className="input-area">
          {activeMode !== "free" && (
            <div style={{ marginBottom: "8px" }}>
              <span className="mode-badge">
                {currentMode.icon} {currentMode.label}
                <button className="mode-badge-close" onClick={() => setActiveMode("free")} title="Volver al modo libre">×</button>
              </span>
            </div>
          )}
          <div className="input-wrapper">
            <ModeSelector activeMode={activeMode} onSelect={handleModeSelect} />
            <textarea
              ref={textareaRef}
              className="chat-input"
              placeholder={placeholder}
              value={input}
              onChange={handleTextarea}
              onKeyDown={handleKey}
              rows={1}
            />
            <button
              className="send-btn"
              onClick={() => sendMessage()}
              disabled={!input.trim() || loading}
              title="Enviar"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
          <p className="input-hint">SofIA puede cometer errores. Verifica información crítica.</p>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
